<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool moved</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: #f5f7fa;
            color: #1f2933;
        }

        .card {
            max-width: 720px;
            width: 100%;
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 16px;
        }

        p {
            margin: 0 0 16px;
            line-height: 1.6;
        }

        a {
            color: #0b66d6;
            font-weight: bold;
            word-break: break-word;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #111827;
                color: #f3f4f6;
            }

            .card {
                background: #1f2937;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            }

            a {
                color: #60a5fa;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>This tool has been replaced</h1>
        <p>Please use <a href="https://tomquist.github.io/hmjs/">https://tomquist.github.io/hmjs/</a> instead.</p>
    </main>
</body>
</html>
